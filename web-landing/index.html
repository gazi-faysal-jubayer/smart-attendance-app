<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KUET Attendance | Email Verified</title>
  <style>
    :root {
      --primary: #1a3a6b;
      --primary-dark: #0f2448;
      --secondary: #c8960c;
      --surface: #f4f6fa;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: radial-gradient(circle at 20% 20%, rgba(200,150,12,0.12), transparent 35%),
                  radial-gradient(circle at 80% 10%, rgba(26,58,107,0.18), transparent 40%),
                  linear-gradient(180deg, var(--primary-dark), var(--primary));
      color: #eef2f7;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }
    .card {
      width: min(480px, 100%);
      background: #fff;
      color: #0f172a;
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 18px 50px rgba(0,0,0,0.16);
      border: 1px solid rgba(15,23,42,0.08);
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 12px;
      background: rgba(26,58,107,0.08);
      color: var(--primary-dark);
      font-weight: 600;
      letter-spacing: 0.2px;
    }
    h1 {
      margin: 14px 0 6px;
      font-size: 26px;
      color: #0f2448;
    }
    p { margin: 6px 0 0; color: #475569; line-height: 1.5; }
    .actions { margin-top: 24px; display: flex; gap: 12px; flex-wrap: wrap; }
    button, a.button {
      border: none;
      cursor: pointer;
      border-radius: 12px;
      padding: 14px 18px;
      font-weight: 600;
      font-size: 15px;
      transition: transform 0.08s ease, box-shadow 0.12s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .primary { background: linear-gradient(120deg, var(--primary), var(--primary-dark)); color: #fff; box-shadow: 0 10px 25px rgba(26,58,107,0.35); }
    .ghost { background: rgba(15,23,42,0.06); color: #0f2448; }
    button:active, a.button:active { transform: translateY(1px); }
    .code { margin-top: 16px; padding: 12px 14px; background: #f8fafc; border-radius: 10px; border: 1px solid #e2e8f0; font-family: monospace; font-size: 13px; color: #334155; word-break: break-all; }
    .note { margin-top: 10px; font-size: 13px; color: #6b7280; }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">✔ Email verified</div>
    <h1>Welcome to KUET Attendance</h1>
    <p>Your email has been confirmed. If you opened this on your phone, tap below to continue in the app.</p>
    <div class="actions">
      <a id="open-app" class="button primary" href="#">Open in app</a>
      <button class="ghost" id="copy-code">Copy verification code</button>
    </div>
    <div id="code-box" class="code" style="display:none;"></div>
    <p class="note">If the app does not open, make sure it is installed, then try again.</p>
  </div>
  <script>
    function getParam(name) {
      const params = new URLSearchParams(window.location.search);
      return params.get(name);
    }
    const code = getParam('code');
    const token = getParam('token');
    const next = getParam('next');
    const link = document.getElementById('open-app');
    const codeBox = document.getElementById('code-box');
    const copyBtn = document.getElementById('copy-code');
    const deepLinkBase = 'kuet.attendance://auth-callback';
    const qs = new URLSearchParams();
    if (code) qs.set('code', code);
    if (token) qs.set('token', token);
    if (next) qs.set('next', next);
    const deepLink = qs.toString() ? `${deepLinkBase}?${qs.toString()}` : deepLinkBase;
    link.href = deepLink;
    if (code) {
      codeBox.style.display = 'block';
      codeBox.textContent = code;
    }
    copyBtn.addEventListener('click', async () => {
      if (!code) return;
      try {
        await navigator.clipboard.writeText(code);
        copyBtn.textContent = 'Copied!';
        setTimeout(() => copyBtn.textContent = 'Copy verification code', 1800);
      } catch (e) {
        copyBtn.textContent = 'Copy not available';
      }
    });
    // Auto-attempt deep link on load (mobile)
    setTimeout(() => { window.location.href = deepLink; }, 300);
  </script>
</body>
</html>
