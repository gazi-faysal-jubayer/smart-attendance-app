name: smart_attendance
description: "KUET Smart Attendance System"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # Backend & Auth
  supabase_flutter: ^2.5.0

  # Local Database
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.0

  # State Management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^13.2.0

  # UI
  google_fonts: ^6.2.1
  fl_chart: ^0.68.0
  another_flushbar: ^1.12.30

  # Utilities
  excel: ^4.0.6
  connectivity_plus: ^6.0.3
  mqtt_client: ^10.2.1
  path_provider: ^2.1.3
  path: ^1.9.0
  share_plus: ^9.0.0
  open_filex: ^4.4.1
  flutter_secure_storage: ^9.2.2
  flutter_dotenv: ^5.1.0
  csv: ^6.0.0
  file_picker: ^8.0.3
  intl: ^0.19.0
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  drift_dev: ^2.18.0
  build_runner: ^2.4.9
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
